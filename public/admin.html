<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖后台管理 | NeoDraw</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container glass-panel" style="margin-top: 2rem;">
        <div class="flex justify-between items-center mb-4">
            <h1>⚙️ 后台管理中心</h1>
            <div class="flex gap-4">
                <a href="index.html" target="_blank" class="btn btn-outline">▶️ 打开抽奖大屏</a>
                <button class="btn btn-danger" id="btnHardReset">⚠️ 彻底重置所有数据</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="glass-panel stat-card">
                <h3>总名单池</h3>
                <div class="stat-value" id="statTotalParticipants">0</div>
                <div class="text-sm" style="color: var(--text-muted)">当前可参与抽奖人数</div>
            </div>
            <div class="glass-panel stat-card">
                <h3>预设奖项总额</h3>
                <div class="stat-value" id="statTotalPrizes">0</div>
                <div class="text-sm" style="color: var(--text-muted)">各类奖品名额总和</div>
            </div>
            <div class="glass-panel stat-card">
                <h3>已抽出奖项</h3>
                <div class="stat-value" id="statDrawnPrizes">0</div>
                <div class="text-sm" style="color: var(--text-muted)">包含各等奖项</div>
            </div>
        </div>

        <div class="grid grid-cols-2">
            <!-- Left Column -->
            <div class="flex-col gap-4">
                <div class="glass-panel" style="padding: 1.5rem;">
                    <div class="flex justify-between items-center mb-4">
                        <h2>👥 导入抽奖名单</h2>
                        <button class="btn btn-danger btn-sm" id="btnClearParticipants">清空名单</button>
                    </div>
                    <div class="form-group">
                        <label>请输入候选人名单（每行一个名字，或用逗号分隔）</label>
                        <textarea id="txtParticipantsInput" placeholder="张三&#10;李四&#10;王五"></textarea>
                    </div>
                    <button class="btn btn-primary w-full" id="btnAddParticipants" style="width: 100%">➕ 批量导入名单</button>
                </div>

                <div class="glass-panel mt-4" style="padding: 1.5rem;">
                    <div class="flex justify-between items-center mb-4">
                        <h2>🏆 奖项设置</h2>
                        <button class="btn btn-primary btn-sm" id="btnSavePrizes">💾 保存奖项</button>
                    </div>
                    <div id="prizeListContainer" class="flex-col" style="gap: 1rem; display: flex;">
                        <!-- Prize rows injected by JS -->
                    </div>
                    <button class="btn btn-outline w-full mt-4" id="btnAddPrizeRow" style="width: 100%">➕ 新增奖项</button>
                </div>
            </div>

            <!-- Right Column -->
            <div class="glass-panel" style="padding: 1.5rem; height: 100%; display: flex; flex-direction: column;">
                <div class="flex justify-between items-center mb-4">
                    <h2>📜 中奖历史记录</h2>
                    <button class="btn btn-outline btn-sm" id="btnResetHistory">↺ 撤销所有中奖</button>
                </div>
                <div class="table-responsive" style="flex: 1;">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>奖项</th>
                                <th>中奖人</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- History injected by JS -->
                        </tbody>
                    </table>
                    <div id="emptyHistoryState" style="text-align: center; padding: 2rem; color: var(--text-muted);">
                        暂无中奖记录，快去前台开启抽奖吧！
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Need to load JS at bottom -->
    <script src="js/store.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
